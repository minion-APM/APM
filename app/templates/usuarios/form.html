{% extends "base.html" %}

{% block titulo %}
{{ "Editar" if editando else "Novo" }} Usuário - AAPM SENAI
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/usuario-form.css">
{% endblock %}

{% block conteudo %}

<div class="form-container">

    <h1 class="form-title">
        {{ "Editar usuário" if editando else "Novo usuário" }}
    </h1>

    {% if erro %}
        <div class="erro">
            {{ erro }}
        </div>
    {% endif %}

    <form
        class="usuario-form"
        action="{{ '/usuarios/' + editando.id|string + '/editar' if editando else '/usuarios/novo' }}"
        method="post"
    >

        <label>
            Nome
            <input
                type="text"
                name="nome"
                value="{{ editando.nome if editando else (valores.nome if valores else '') }}"
                required
            >
        </label>

        <label>
            E-mail
            <input
                type="email"
                name="email"
                value="{{ editando.email if editando else (valores.email if valores else '') }}"
                required
            >
        </label>

        <label>
            Senha {{ "(deixe vazio para manter a atual)" if editando else "" }}
            <input
                type="password"
                name="senha"
                {{ '' if editando else 'required' }}
                autocomplete="{{ 'current-password' if editando else 'new-password' }}"
            >
        </label>

        <label>
            Perfil
            <select name="role">
                {% set roles = ['admin', 'operador'] %}
                {% for r in roles %}
                    <option
                        value="{{ r }}"
                        {{ 'selected' if (editando and editando.role == r) or (valores and valores.role == r) else '' }}
                    >
                        {{ r | capitalize }}
                    </option>
                {% endfor %}
            </select>
        </label>

        <div class="form-actions">

            <button type="submit" class="btn-salvar">
                {{ "Salvar alterações" if editando else "Criar usuário" }}
            </button>

            <a href="/usuarios" class="btn-cancelar">
                Cancelar
            </a>

        </div>

    </form>

</div>

{% endblock %}
