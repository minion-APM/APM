<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block titulo %}AAPM - SENAI{% endblock %}</title>
 
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
 
  <!-- CSS do projeto -->
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/css/auth.css">
  <link rel="stylesheet" href="/static/css/index-inicial.css">
 
  <!-- CSS específico por página (opcional — cada template pode sobrescrever) -->
  {% block extra_css %}{% endblock %}
</head>
<body>
 
  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
 
      <div class="logo-area">
        <div class="logo-icon">⚙</div>
        <div class="logo-text">
          <span class="logo-aapm">AAPM</span>
          <span class="logo-senai">SENAI</span>
        </div>
      </div>
 
      {% if usuario %}
      <nav class="nav">
        <a href="/dashboard"  class="nav-link">Dashboard</a>
        <a href="/categorias" class="nav-link">Categorias</a>
        <a href="/produtos"   class="nav-link">Produtos</a>
        <a href="/movimentacoes" class="nav-link">Movimentações</a>
        {% if usuario.role == 'admin' %}
          <a href="/usuarios" class="nav-link">Usuários</a>
        {% endif %}
      </nav>
 
      <div class="header-user">
        <span class="header-user__name">{{ usuario.nome }}</span>
        <span class="role-badge role-badge--{{ usuario.role|lower }}">{{ usuario.role }}</span>
        <a href="/auth/logout" class="btn-logout">Sair</a>
      </div>
      {% endif %}
 
    </div>
  </header>
 
  <!-- CONTEÚDO PRINCIPAL -->
  <main class="main-content">
    {% block conteudo %}{% endblock %}
  </main>
 
  <!-- RODAPÉ -->
  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-brand">AAPM &mdash; Sistema de Gestão</span>
      <span class="footer-sep">|</span>
      <span class="footer-info">SENAI &copy; 2025</span>
    </div>
  </footer>
 
</body>
</html>
